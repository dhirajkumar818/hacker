<!DOCTYPE html>
<html>
<head>
    <title>Hacker Screen</title>

    <style>

        body{
            margin:0;
            background:black;
            overflow:hidden;
            font-family:monospace;
        }

        canvas{
            display:block;
        }

        h1{
            position:absolute;
            top:40%;
            width:100%;
            text-align:center;
            color:#00ff00;
            font-size:50px;
            text-shadow:0 0 20px #00ff00;
        }

    </style>
</head>

<body>

<h1>ACCESS GRANTED 🔥</h1>

<canvas id="matrix"></canvas>

<script>

const canvas = document.getElementById("matrix");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

const letters =
"01ABCDEFGHIJKLMNOPQRSTUVWXYZ";

const array = letters.split("");

const fontSize = 16;

const columns = canvas.width / fontSize;

const drops = [];

for(let i=0; i<columns; i++){
    drops[i] = 1;
}

function draw(){

    ctx.fillStyle =
    "rgba(0,0,0,0.05)";

    ctx.fillRect(
    0,
    0,
    canvas.width,
    canvas.height
    );

    ctx.fillStyle = "#00ff00";

    ctx.font =
    fontSize + "px monospace";

    for(let i=0; i<drops.length; i++){

        const text =
        array[Math.floor(
        Math.random() *
        array.length)];

        ctx.fillText(
        text,
        i * fontSize,
        drops[i] * fontSize
        );

        if(
        drops[i] * fontSize >
        canvas.height &&
        Math.random() > 0.975
        ){
            drops[i] = 0;
        }

        drops[i]++;
    }
}

setInterval(draw,33);

</script>

</body>
</html>
